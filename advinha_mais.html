<meta charset="utf-8">

<h1>Jogo Adivinha</h1>

<h4>Coloque ´seu chute e pressione o botão!</h4>

<input/>

<button>Compare com meu segredo</button>


<script>

	function sorteia() {
		return Math.round(Math.random() * 10);
	}

	function sorteiaNumeros(quantidade) {

		var segredos = [];
		var numero = 1;

		while(numero <= quantidade) {

			var numeroAleatorio = sorteia();

			if (numeroAleatorio != 0) {

			var achou = false;

			for(var posicao = 0; posicao < segredos.length; posicao++) {

				if(segredos[posicao] == numeroAleatorio){
					achou = true;
					break;
				}
			}

			if(achou == false) {
				segredos.push(numeroAleatorio);
				numero++;	
			}


			}
			
		}

		return segredos;
	}





	var  segredos = sorteiaNumeros(3);

	var input = document.querySelector("input"); //o nome da variável pode ser outro; porém dentro do parâmetro deve estar o mesmo nome;
	input.focus();






	function verifica(){

		var achou = false;

		for(var posicao = 0; posicao < segredos.length; posicao++) {

			if (input.value == segredos[posicao]) {

			alert("Você ACERTOU!");
			achou = true;
			break;

			}
		}

		if(achou == false) {

			alert("Você ERROU");

		}

			 input.value = ""; //limpa
			 input.focus(); //foco

	}
 

	var button = document.querySelector("Button"); 
	button.onclick = verifica; //não fechando parentese passa os valores para botton.onclick;


</script>
