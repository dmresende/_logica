<meta charset="utf-8">
<h1> Tabuada Simples!</h1>

<script>

	function pulaLinha() {

		document.write("<br>");
	}
	

	function mostra(imprime) {

		document.write(imprime);
		pulaLinha()
	}


	for (var multiplicador = 1;  multiplicador <= 10; multiplicador++) {

		mostra(1 * multiplicador);
		mostra(2 * multiplicador);
		mostra(3 * multiplicador);
		mostra(4 * multiplicador);
		mostra(5 * multiplicador);
		mostra(6 * multiplicador);
		mostra(7 * multiplicador);
		mostra(8 * multiplicador);
		mostra(9 * multiplicador);
		mostra(10 * multiplicador);
		pulaLinha();
		pulaLinha();		

	}

	mostra("FIM");
	pulaLinha();



</script>
