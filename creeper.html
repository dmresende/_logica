	pincel.fillStyle = 'darkgreen';

	pincel.fillStyle = 'black';

	pincel.fillStyle = 'black';
	pincel.fillRect(100,180,40,100);

	pincel.fillStyle = 'black';
	pincel.fillRect(200,180,40,100);


	
</script>
