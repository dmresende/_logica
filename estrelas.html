<meta charset="utf-8">

<h1>ESTRELAS!</h1> 

<h3>Bem-Vindo!!!</h3>

<script>

	function pulaLinha() {
		document.write("<br>");	
	}

	function mostra(imprime) {
		document.write(imprime);
		pulaLinha();
	}

	//usar na tabuada;
	for(var linha = 1; linha <=3; linha++) {
		for(var coluna = 1; coluna <= 10; coluna++){
			document.write("*");
		}
		pulaLinha();
	}


</script>
