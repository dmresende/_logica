<meta charset="utf-8">
<h1>Pontuação do Seu time No Campeonato!</h1>
<h2>Calcule o total de pontos conquistados pelo seu time!</h2>
Programa Elaborado como Exercício das Aulas de Lógica de Programação Ministrado pela Platadorma Alura.com.

<script>
	
	function pulaLinha(){

		document.write("<br><br>");

	}

	function imprime(mostra){

		document.write(mostra);

	}

	var nome = prompt("Gostariamos de te conhecer melhor, Qual é o seu nome? ");
	var time = prompt("Qual é o seu time de coração? ");


	var vitorias = parseInt(prompt("Entre com o números de vitórias."));
	var empates = parseInt(prompt("Entre com o número de empates. "));
	var derrotas = parseInt(prompt("Entre com o número de Derrotas. "));

	var pontosAnosAnterior = parseInt(prompt("Pontuação do seu time no ano anterior? "));

	var pontos = (vitorias * 3 ) + empates;

		if(pontos > pontosAnosAnterior) {
			pulaLinha()
			imprime("O seu time está melhor que o ano passado.");
		}

		if(pontos == pontosAnosAnterior) {
			pulaLinha()
			imprime("O seu time está igual que o ano passado.");
		}

		if(pontos < pontosAnosAnterior){
			pulaLinha()
			imprime("O seu time está pior que o ano passado.");
		}
	


	imprime("<br>" + "Torcedor: " + nome + "<br>" + "Seu time do coração é o (a): " + time + "<br>" + "Os total de pontos do seu time é de: " + pontos + "<br>" + "Derrotas: " + derrotas + "<br>" + "Empates: " + empates);

</script>
