<meta charset="utf-8">
<h1> Contador</h1>

<script>
	
	function pulaLinha() {

		document.write("<br>");
	}


	function mostra(imprime) {

		document.write(imprime);
	}

	mostra("Contador ordem crescente: ");


	var contador = 0;

	while(contador <= 10) {
		
		mostra("" + contador);
		pulaLinha();
		contador++
	}


	pulaLinha();
	pulaLinha();
	mostra("Contador descrescente: ");

	var contador = 10;

	while(contador >= 0) {
		
		mostra("" + contador);
		pulaLinha();
		contador--;
	}




</script>
