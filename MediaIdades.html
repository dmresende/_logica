<meta charset="utf-8">
<h1> Media Idades!</h1>

<script>

	function pulaLinha() {

		document.write("<br>");
	}
	

	function mostra(imprime) {

		document.write(imprime);
		pulaLinha()
	}

	var totalFamiliares = parseInt(prompt("Qual a quantidade de familiares? "));

	var numero = 1;
	var totalIdades = 0;

	while(numero <= totalFamiliares) {

		var idades = parseInt(prompt("Qual é a idade? "));
		totalIdades = totalIdades + idades;
		numero++;
	}

	var mediaIdades = totalIdades / totalFamiliares;
	mostra("A média das idades é: " + mediaIdades);




</script>
