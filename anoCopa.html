<meta charset="utf-8">

<script>
	

	function pulaLinha() {

		document.write("<br>");
	}

	function mostra(imprime) {
		
		document.write(imprime);
	}

	var anoLimite = parseInt(prompt("Entre com com um ano limite: "));
	var anoCopa = 1930;

	while(anoCopa <= anoLimite) {

		mostra("Teve copa em: " + anoCopa);
		pulaLinha();	
		anoCopa = anoCopa + 4;

	}

	mostra("Fim");

</script>
